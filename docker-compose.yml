services:
  indiserver:
    build: ./indiserver
    container_name: indiserver
    restart: unless-stopped
    privileged: true          # needed for USB device access
    network_mode: host        # INDI clients connect on port 7624
    volumes:
      - /dev/bus/usb:/dev/bus/usb
      - ./config:/config
      - ./shots:/shots
    environment:
      - TZ=${TZ:-UTC}

  mqtt-bridge:
    build: ./mqtt-bridge
    container_name: astrophoto-mqtt
    restart: unless-stopped
    network_mode: host        # reaches indiserver on localhost:7624 and MQTT broker on network
    volumes:
      - ./shots:/shots
    environment:
      - MQTT_HOST=${MQTT_HOST:-localhost}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_PREFIX=${MQTT_PREFIX:-astrophoto}
      - INDI_HOST=localhost
      - INDI_PORT=7624
      - CAMERA_DEVICE=GPhoto CCD
      - TZ=${TZ:-UTC}
    depends_on:
      - indiserver

  # webmanager: optional INDI web UI — add when a working arm64 image is available
